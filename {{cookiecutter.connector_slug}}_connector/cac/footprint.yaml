# RobotFootprint defines the physical outline and safety buffer of the robot.
# footprint: actual robot body polygon (x, y in meters, robot center = origin)
# bufferFootprint: safety buffer polygon used for collision avoidance visualization
# Scope: use `tag/<ACCOUNT_ID>/<TAG_ID>` to target a robot group.

